<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>L. V. Holzmaister - Interactive Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <!-- Tailwind via CDN for simplicity in this setup -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CRITICAL: Ensure full height for map rendering */
        html, body, #root {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        /* Disable text selection for kiosk mode */
        body {
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            background-color: #1a1814;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #2d2a24;
        }
        ::-webkit-scrollbar-thumb {
            background: #8c7b5d;
            border-radius: 4px;
        }
        /* Leaflet override */
        .leaflet-container {
            background: #1a1814 !important;
            /* Force hardware acceleration to fix choppy zoom */
            will-change: transform;
        }
        /* Optimize images for performance */
        .leaflet-image-layer {
            image-rendering: high-quality;
        }
    </style>
  <script type="importmap">

  }
}
</script>
</head>
